<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Indicators</title>
    <link rel="stylesheet" href="css/index.css?v=5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="container">
        <div style="display:flex; justify-content:flex-end; margin-bottom: 10px;">
            <a href="index.html">
                <button
                    style="background: #007bff; color:#fff; border:none; padding:9px 20px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; letter-spacing:0.4px; box-shadow:0 2px 8px rgba(0,123,255,0.35); transition:all 0.2s ease;"
                    onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 14px rgba(0,123,255,0.5)'"
                    onmouseout="this.style.transform='';this.style.boxShadow='0 2px 8px rgba(0,123,255,0.35)'">
                    ← Back to Dashboard
                </button>
            </a>
        </div>

        <h1 style="text-align: center; margin-bottom: 2px; color: #000;">OLT Health Indicators</h1>
        <div id="reportDate" style="text-align: center; color: #666; margin-bottom: 20px; font-size: 0.9em;">Report Date: Initializing...
        </div>

        <div class="stats">
            <div class="stat-card" id="totalCard">
                <div class="stat-value" id="totalNum">0</div>
                <div class="stat-label">Total OLTs</div>
            </div>
            <div class="stat-card" id="reachableCard">
                <div class="stat-value" id="upNum" style="color: #4caf50;">0</div>
                <div class="stat-label">UP</div>
            </div>
            <div class="stat-card" id="unreachableCard">
                <div class="stat-value" id="downNum" style="color: #f44336;">0</div>
                <div class="stat-label">DOWN</div>
            </div>
        </div>

        <div class="filters">
            <input type="text" id="search" placeholder="Search OLTs..." style="flex: 1;">

            <select id="districtFilter" class="btn" style="min-width: 150px; cursor: pointer;">
                <option value="all">All Districts</option>
            </select>

            <div class="btn-group">
                <button class="btn active" id="btnAll" onclick="setFilter('all', this)">All</button>
                <button class="btn" id="btnUp" onclick="setFilter('UP', this)">UP</button>
                <button class="btn" id="btnDown" onclick="setFilter('DOWN', this)">DOWN</button>
            </div>
            <div class="refresh-wrap">
                <button class="btn" id="refreshBtn" onclick="loadHealth(true)"
                    style="background-color: #28a745; color: white; border-color: #28a745; font-weight: bold;">Refresh</button>
                <div class="btn-spinner" id="btnSpinner"></div>
            </div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Sl No.</th>
                        <th>District</th>
                        <th>Block</th>
                        <th>OLT Name</th>
                        <th>OLT Code</th>
                        <th>Status</th>
                        <th style="text-align: center;">Preview</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination" style="display:none;"></div>
    </div>

    <div id="previewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="previewTitle" style="margin:0;">Asset Details</h3>
                <span class="close-x" onclick="closePreview()">&times;</span>
            </div>
            <div class="modal-body" id="previewBody"></div>
            <div class="modal-footer">
                <button class="btn-blue" onclick="closePreview()">Close</button>
            </div>
        </div>
    </div>

    <script src="js/health.js?v=5"></script>
</body>

</html>
