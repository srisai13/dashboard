<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Node Dashboard</title>
    <link rel="stylesheet" href="css/index.css?v=100">
</head>

<body>
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 20px;">Block Node Dashboard - OLT</h1>


        <div class="stats">
            <div class="stat-card" id="totalCard">
                <div class="stat-value" id="totalNum">0</div>
                <div class="stat-label">Total Block Nodes</div>
            </div>
            <div class="stat-card" id="reachableCard">
                <div class="stat-value" id="upNum" style="color: #4caf50;">0</div>
                <div class="stat-label">Reachable (UP)</div>
            </div>
            <div class="stat-card" id="unreachableCard">
                <div class="stat-value" id="downNum" style="color: #f44336;">0</div>
                <div class="stat-label">Unreachable (DOWN)</div>
            </div>
        </div>

        <div class="filters">
            <input type="text" id="search" placeholder="Search by name, IP, district, GP location...">
            <select id="distFilter">
                <option value="">All Districts</option>
            </select>
            <div class="custom-date-picker-container" style="position: relative;">
                <div class="custom-date-picker" onclick="toggleDateDropdown(event)" id="datePickerBtn">
                    <span id="dateDisplay">All Dates</span>
                    <div id="clearDateBtn" class="clear-date-btn" onclick="clearDateFilter(event)" title="Clear Date Filter">&times;</div>
                    <div class="calendar-icon-box">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5z" />
                        </svg>
                    </div>
                </div>

                <!-- Neat Date Range Dropdown -->
                <div id="dateRangeDropdown" class="date-range-dropdown">
                    <div class="dropdown-header">Select Date Range</div>
                    <div class="presets-grid">
                        <button onclick="setDatePreset('today')">Today</button>
                        <button onclick="setDatePreset('yesterday')">Yesterday</button>
                        <button onclick="setDatePreset('7days')">Last 7 Days</button>
                        <button onclick="setDatePreset('30days')">Last 30 Days</button>
                    </div>
                    <div class="custom-range-inputs">
                        <div class="input-group">
                            <label>From:</label>
                            <input type="date" id="startDateFilter">
                        </div>
                        <div class="input-group">
                            <label>To:</label>
                            <input type="date" id="endDateFilter">
                        </div>
                    </div>
                    <div class="dropdown-actions">
                        <button class="btn-clear" onclick="clearDateFilter()">Clear</button>
                        <button class="btn-apply" onclick="applyDateRange()">Apply Range</button>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn active" id="btnAll" onclick="filter('all', this)">All</button>
                <button class="btn" id="btnUp" onclick="filter('UP', this)">Reachable</button>
                <button class="btn" id="btnDown" onclick="filter('UNREACHABLE', this)">Unreachable</button>
            </div>
            <div class="refresh-container" style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
                <button class="btn btn-refresh" id="refreshBtn" onclick="syncLiveApi()">Refresh</button>
                <div id="syncSpinner" class="sync-spinner" style="display: none;"></div>
            </div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Sl No.</th>
                        <th>District</th>
                        <th>Block Node Name</th>
                        <th>Block Code</th>
                        <th>Block Node IP</th>
                        <th>GP Block</th>
                        <th>Status</th>
                        <th>GPs</th>
                        <th>GP Locations</th>
                        <th style="text-align: center;">Preview</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination" style="display:none;"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Refresh Done!</div>

    <div id="previewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="previewTitle" style="margin:0;">Node Details</h3>
                <span class="close-x" onclick="closePreview()">&times;</span>
            </div>
            <div class="modal-body" id="previewBody"></div>
            <div class="modal-footer">
                <button class="btn-blue" onclick="closePreview()">Close</button>
            </div>
        </div>
    </div>

    <script src="js/app.js?v=100"></script>
</body>

</html>
