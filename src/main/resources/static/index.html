<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Node Dashboard</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div id="loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:3px; background:#2196f3; z-index:9999;"></div>
    
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 5px;">Block Node Dashboard - OLT & GP</h1>
        <div id="reportDate" style="text-align: center; color: #666; margin-bottom: 30px;">Report Date: Initializing...</div>

        <div class="stats">
            <div class="stat-card" id="totalCard">
                <div class="stat-value" id="totalNum">0</div>
                <div class="stat-label">Total Block Nodes</div>
            </div>
            <div class="stat-card" id="reachableCard">
                <div class="stat-value" id="upNum" style="color: #4caf50;">0</div>
                <div class="stat-label">Reachable (UP)</div>
            </div>
            <div class="stat-card" id="unreachableCard">
                <div class="stat-value" id="downNum" style="color: #f44336;">0</div>
                <div class="stat-label">Unreachable (DOWN)</div>
            </div>
        </div>

        <div class="filters">
            <input type="text" id="search" placeholder="Search by name, IP, district, GP location...">
            <select id="distFilter">
                <option value="">All Districts</option>
            </select>
            <div class="btn-group">
                <button class="btn active" id="btnAll" onclick="filter('all', this)">All</button>
                <button class="btn" id="btnUp" onclick="filter('UP', this)">Reachable</button>
                <button class="btn" id="btnDown" onclick="filter('UNREACHABLE', this)">Unreachable</button>
            </div>
            <button class="btn" id="refreshBtn" onclick="syncLiveApi()" style="margin-left: auto; background-color: #28a745; color: white; border-color: #28a745; font-weight: bold;">Refresh</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>District</th>
                        <th>Block Node Name</th>
                        <th>Block Code</th>
                        <th>Block Node IP</th>
                        <th>GP Block</th>
                        <th>Status</th>
                        <th>GPs</th>
                        <th>GP Locations</th>
                        <th style="text-align: center;">Preview</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="previewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="previewTitle" style="margin:0;">Node Details</h3>
                <span class="close-x" onclick="closePreview()">&times;</span>
            </div>
            <div class="modal-body" id="previewBody"></div>
            <div class="modal-footer">
                <button class="btn-blue" onclick="closePreview()">Close</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
